<script>
// ============================================================
// LOCK STATE — centralized, not scattered per-element
// ============================================================
const lockState = {};

function isLocked(id) { return lockState[id] === true; }

function toggleLock(id, iconEl) {
    lockState[id] = !lockState[id];
    const locked = lockState[id];
    if (iconEl) {
        iconEl.classList.toggle('fa-lock', locked);
        iconEl.classList.toggle('fa-lock-open', !locked);
        iconEl.classList.toggle('locked', locked);
        iconEl.classList.toggle('unlocked', !locked);
    }
    // Apply visual feedback to the target element
    const el = document.getElementById(id);
    if (el) {
        if (el.tagName === 'SELECT' || (el.tagName === 'INPUT' && el.type !== 'hidden')) {
            el.style.borderColor = locked ? '#ef4444' : '';
            el.style.opacity = locked ? '0.7' : '';
        }
    }
}

// Dedicated lock toggles for list-based hidden inputs
function toggleLocLock() {
    const iconEl = document.getElementById('locLockIcon');
    lockState['locSelect'] = !lockState['locSelect'];
    const locked = lockState['locSelect'];
    iconEl.classList.toggle('fa-lock', locked);
    iconEl.classList.toggle('fa-lock-open', !locked);
    iconEl.classList.toggle('locked', locked);
    iconEl.classList.toggle('unlocked', !locked);
    const container = document.getElementById('locListContainer');
    if (container) {
        container.classList.toggle('locked-border', locked);
    }
}
function toggleCamLock() {
    const iconEl = document.getElementById('camLockIcon');
    lockState['cameraSelect'] = !lockState['cameraSelect'];

function getRandom(arr) {
    if (!arr || arr.length === 0) return "";
    return arr[Math.floor(Math.random() * arr.length)];
}

function getVal(id) {
    const el = document.getElementById(id);
    return el ? el.value : "";
}

function isMirrorFriendly(envName) {
    if (!envName) return false;
    const kw = ["BATHROOM","BEDROOM","KOS","CAFE","MALL","CLUB","RESTROOM","TOILET","CORNER","ROOM","COMPOUND","CAR","INNOVA","MERCEDES","ALPHARD","THRIFT","STORE","ELEVATOR","BED","LAUNDROMAT","PHOTOBOOTH","CONVEX","CERMIN","WARUNG","BARBERSHOP","STUDIO","KLINIK","KTP"];
    return kw.some(k => envName.toUpperCase().includes(k));
}

function getWeightedEra() {
    const total = eraWeights.reduce((s, e) => s + e.weight, 0);
    let r = Math.random() * total;
    for (const era of eraWeights) {
        if (r < era.weight) return era.id;
        r -= era.weight;
    }
    return "MODERN_2020S";
}

// ============================================================
// RADIO LIST BUILDER
// ============================================================
function createRadioOption(name, value, label, selectedValue, subText = "") {
    const checked = value === selectedValue ? "checked" : "";
    const bg = checked ? "bg-slate-700 border-slate-500 shadow-inner" : "border-transparent hover:border-slate-600 hover:bg-slate-700/50";
    const sub = subText ? `<div class="text-[10px] text-slate-400 leading-tight mt-1 line-clamp-2">${subText}</div>` : "";
    return `
    <label class="flex items-start gap-3 p-3 rounded-lg cursor-pointer transition-all border w-full radio-label ${bg}">
        <input type="radio" name="${name}" value="${value}" ${checked} class="mt-0.5 accent-red-500 w-4 h-4 shrink-0 cursor-pointer radio-input">
        <div class="flex flex-col flex-1 pointer-events-none">
            <span class="text-sm text-slate-200 font-semibold leading-tight">${label}</span>${sub}
        </div>
    </label>`;
}

function setupListDelegation(containerId, hiddenId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.addEventListener('change', (e) => {
        if (!e.target.classList.contains('radio-input')) return;
        document.getElementById(hiddenId).value = e.target.value;
        container.querySelectorAll('.radio-label').forEach(l => {
            l.classList.remove('bg-slate-700','border-slate-500','shadow-inner');
            l.classList.add('border-transparent','hover:border-slate-600','hover:bg-slate-700/50');
        });
        const parent = e.target.closest('.radio-label');
        if (parent) {
            parent.classList.add('bg-slate-700','border-slate-500','shadow-inner');
            parent.classList.remove('border-transparent','hover:border-slate-600','hover:bg-slate-700/50');
        }
        triggerGenerate();
    });
}

// ============================================================
// SUBJECT / GENDER / AGE BUILDER
// ============================================================
function buildSubject(forcedGender, forcedAge, bodyTypeVal) {
    // Age prefix
    let agePrefix = "A YOUNG";
    if (forcedAge === "TEENAGER")    agePrefix = "A TEENAGE";
    else if (forcedAge === "YOUNG_ADULT") agePrefix = "A YOUNG ADULT";
    else if (forcedAge === "ADULT")  agePrefix = "A 30-YEAR-OLD";
    else if (forcedAge === "MATURE") agePrefix = "A MIDDLE-AGED";
    else {
        const r = Math.random() * 100;
        if (r < 40) agePrefix = "A YOUNG";
        else if (r < 70) agePrefix = "A TEENAGE";
        else if (r < 88) agePrefix = "A 30-YEAR-OLD";
        else agePrefix = "A MIDDLE-AGED";
    }

    // Gender
    let genderId = forcedGender;
    if (!genderId || genderId === "RANDOM") genderId = Math.random() < 0.5 ? "FEMALE" : "MALE";

    // Body type
    let bodyDesc = "";
    if (bodyTypeVal && bodyTypeVal !== "MATCH" && bodyTypeVal !== "RANDOM") bodyDesc = bodyTypeVal + " ";
    else if (bodyTypeVal === "RANDOM") bodyDesc = getRandom(["SLIM AND PETITE ","THICK AND CURVY ","MUSCULAR AND TONED ","CHUBBY ",""]);

    const genderWord = genderId === "FEMALE"
        ? (agePrefix === "A TEENAGE" ? "GIRL" : "WOMAN")
        : (agePrefix === "A TEENAGE" ? "BOY"  : "MAN");

    return {
        genderId,
        subjectName: `${agePrefix} ${bodyDesc}${genderWord}`.replace(/\s+/g,' ').trim()
    };
}

        pool.hair    = [...(h.hair    || [])];
        pool.tops    = [...(h.tops    || [])];
        pool.bottoms = [...(h.bottoms || [])];
        pool.shoes   = [...(h.shoes   || [])];
        pool.acc     = [...(h.acc     || [])];
    } else {
        const eraData = wardrobeDB[eraId] || wardrobeDB["MODERN_2020S"];
        const g = eraData[genderId] || eraData["MALE"];
        pool.hair    = [...(g.hair    || [])];
        pool.tops    = [...(g.tops    || [])];
        pool.bottoms = [...(g.bottoms || [])];
        pool.shoes   = [...(g.shoes   || [])];
        pool.acc     = [...(g.acc     || [])];
    }

    // Context-based pool augmentations (same logic as original, kept intact)
    if (envName) {
        const env = envName.toUpperCase();

        if (env.includes("CONCERT") || env.includes("STAGE") || env.includes("BACKSTAGE")) {
            if (genderId === "MALE") { pool.tops.push("BLACK SLEEVELESS BAND SHIRT","OPEN LEATHER JACKET WITH NO SHIRT","OVERSIZED VINTAGE BAND T-SHIRT"); pool.acc.push("SILVER CHAIN NECKLACE","HOLDING A MICROPHONE","ELECTRIC GUITAR SLUNG OVER SHOULDER"); }
            else { pool.tops.push("EDGY CROP TOP WITH FISHNET ACCENTS","OVERSIZED BAND T-SHIRT AS DRESS","BLACK LEATHER CORSET"); pool.bottoms.push("BLACK CARGO PANTS WITH CHAINS","PLEATED PLAID SKIRT WITH FISHNETS"); pool.acc.push("CHUNKY SILVER CHAIN NECKLACE","HOLDING A MICROPHONE"); }
            if (env.includes("BACKSTAGE")) pool.acc.push("HOLDING A BACKSTAGE VIP LANYARD PASS");
        }
        if (env.includes("TENNIS")) {
            pool.tops.push("PLAIN POLO SHIRT"); pool.bottoms.push("NAVY ATHLETIC SHORTS");
            if (genderId === "FEMALE") pool.bottoms.push("PLEATED TENNIS SKIRT");
            pool.acc.push("HOLDING A TENNIS RACKET");
        }
        if (env.includes("MOTORCYCLE") || env.includes("SCOOTER") || env.includes("VESPA")) {
            pool.tops.push("STRIPED SHIRT UNBUTTONED AT CHEST"); pool.acc.push("WEARING A RETRO BOGO HELMET");
        }
        if (env.includes("PADDLEBOARDING") || env.includes("BOAT") || env.includes("RIVER")) {
            pool.acc.push("LIFE VEST");
        }
        if (env.includes("BEACH") && !env.includes("NIGHT")) {
            pool.acc.push("SNORKELING MASK PUSHED UP ON FOREHEAD","FLORAL BEACH SARONG TIED AT WAIST");
        }
        if (env.includes("STADIUM") || env.includes("GBK")) {
            pool.tops.push("RED FOOTBALL CLUB JERSEY","WHITE NATIONAL TEAM JERSEY");
        }
        if (env.includes("COUCH") || env.includes("BEDROOM") || env.includes("KOS")) {
            pool.acc.push("HOLDING A VIDEO GAME CONTROLLER");
            if (genderId === "FEMALE") { pool.acc.push("FLUFFY SKINCARE HEADBAND"); pool.bottoms.push("PATTERNED LOUNGE PANTS"); }
        }
        if (env.includes("KONDANGAN") || env.includes("WEDDING RECEPTION")) {
            if (genderId === "MALE") { pool.tops = ["BATIK LENGAN PANJANG","FULL BLACK SUIT AND TIE"]; pool.bottoms = ["CELANA BAHAN FORMAL HITAM"]; pool.shoes = ["SEPATU PANTOFEL HITAM"]; }
            else { pool.tops = ["KEBAYA MODERN HIJAB","GAMIS ELEGAN"]; pool.bottoms = ["KAIN BATIK LILIT","LONG SKIRT"]; pool.shoes = ["HIGH HEELS","ELEGANT FLATS"]; pool.acc.push("TAS TANGAN MEWAH"); }
        }
        if (env.includes("STUDIO FOTO KTP")) {
            pool.tops = genderId === "MALE" ? ["PLAIN BLACK T-SHIRT","CRISP WHITE CREWNECK TEE","CASUAL BUTTON-DOWN SHIRT"] : ["PLAIN WHITE BLOUSE","SIMPLE NEAT TOP"];
            pool.hair = genderId === "MALE" ? ["SHORT NEAT BLACK HAIR","CASUAL CREW CUT"] : ["NEAT HAIR UPDO","NEAT BOB"];
            pool.acc = ["NONE"];
        }
        if (env.includes("LUXURY AIRLINE") || env.includes("PRIVATE JET")) {
            if (genderId === "FEMALE") { pool.tops.push("ELEGANT BLAZER OVER CAMISOLE"); pool.acc.push("LUXURY CARRY-ON BAG"); }
            else { pool.tops.push("CRISP SHIRT WITH BLAZER"); }
        }
        if (env.includes("WATERPARK") || env.includes("KOLAM RENANG") || env.includes("POOLSIDE")) {
            pool.tops = genderId === "FEMALE" ? ["BIKINI TOP (MODEST COVERAGE)","ONE-PIECE SWIMSUIT"] : ["SWIM SHORTS (NO SHIRT)"];
            pool.bottoms = genderId === "FEMALE" ? ["BIKINI BOTTOM","SWIM SHORTS"] : ["BOARD SHORTS"];
            pool.shoes = ["FLIP FLOPS","BARE FEET"];
            pool.acc = genderId === "FEMALE" ? ["SUNGLASSES (ROUND OR CAT-EYE)","STRAW HAT","POOL FLOAT"] : ["SUNGLASSES","SWIM CAP"];
        }
    }

    // Safety fallbacks
    if (pool.tops.length    === 0) pool.tops    = ["PLAIN T-SHIRT"];
    if (pool.bottoms.length === 0) pool.bottoms = ["PLAIN PANTS"];
    if (pool.shoes.length   === 0) pool.shoes   = ["CASUAL SNEAKERS"];
    if (pool.hair.length    === 0) pool.hair    = ["NATURAL HAIR"];
    if (pool.acc.length     === 0) pool.acc     = ["NONE"];

    // Filter hijab for named celebrities
    if (customName) {
        const nonHijab = pool.hair.filter(h => !h.includes("HIJAB") && !h.includes("PASHMINA"));
        if (nonHijab.length > 0) pool.hair = nonHijab;
    }

    // Remove phone props when shot type would conflict
    const selfieTypes = ["FRONT_CAMERA_SELFIE","CLOSE_UP_SELFIE","CANDID_INTENTIONAL","POSED_SCENARIO"];
    const phoneConflictEnvs = ["ELEVATOR","STADIUM","BRIDGE","DARK ROOM"];
    const envUp = envName ? envName.toUpperCase() : "";
    const hasPhoneConflictEnv = phoneConflictEnvs.some(e => envUp.includes(e));
    if (selfieTypes.includes(shotType) && !hasPhoneConflictEnv) {
        pool.acc = pool.acc.filter(a => !a.toUpperCase().includes("PHONE"));
        if (pool.acc.length === 0) pool.acc = ["NONE"];
    }

    const w = {
        hair:   getRandom(pool.hair),
        top:    getRandom(pool.tops),
        bottom: getRandom(pool.bottoms),
        shoe:   getRandom(pool.shoes),
        acc:    getRandom(pool.acc)
    };

    // Hijab modesty override
    if (w.hair && (w.hair.includes("HIJAB") || w.hair.includes("PASHMINA"))) {
        if (!activeHoliday) {
            w.top    = getRandom(["OVERSIZED LONG SLEEVE SHIRT","KNIT CARDIGAN OVER T-SHIRT","LONG TUNIC","LONG FLANNEL SHIRT BUTTONED UP"]);
            w.bottom = getRandom(["BAGGY MOM JEANS","WIDE-LEG CULLOTES","LONG PLEATED SKIRT","MAXI SKIRT"]);
        }
    }

    return w;
}

function toggleAdvLock(id, spanEl) {
    lockState[id] = !lockState[id];
    const locked = lockState[id];
    const icon = spanEl.querySelector('i');
    if (icon) {
        icon.classList.toggle('fa-lock', locked);
        icon.classList.toggle('fa-lock-open', !locked);
        icon.classList.toggle('text-red-500', locked);
        icon.classList.toggle('text-slate-500', !locked);
        icon.classList.toggle('locked', locked);
        icon.classList.toggle('unlocked', !locked);
    }
    const el = document.getElementById(id);
    if (el) el.style.borderColor = locked ? '#ef4444' : '';
}

function resetAndGenerate() {
    const selects = ['numSelect','ageSelect','holidaySelect','eraSelect','compSelect','genderSelect','timeSelect','weatherSelect','bodyTypeSelect','hairAccSelect','strictSelect'];
    selects.forEach(id => {
        if (isLocked(id)) return;
        const el = document.getElementById(id);
        if (!el) return;
        if (id === 'holidaySelect')   el.value = "RANDOM_HOLIDAY";
        else if (id === 'compSelect') el.value = "NONE";
        else if (id === 'bodyTypeSelect') el.value = "MATCH";
        else if (id === 'strictSelect')   el.value = "FLEXIBLE";
        else el.value = "RANDOM";
    });

    if (!isLocked('aestheticSelect')) document.getElementById('aestheticSelect').value = "DEFAULT";
    if (!isLocked('locSelect'))       document.getElementById('locSelect').value = "RANDOM";
    if (!isLocked('cameraSelect'))    document.getElementById('cameraSelect').value = "RANDOM";

    if (!isLocked('customNameGlobal')) {
        const el = document.getElementById('customNameGlobal');
        if (el) { el.value = ""; handleGlobalNameInput(); }
    }
    if (!isLocked('customScenarioInput')) {
        const el = document.getElementById('customScenarioInput');
        if (el) el.value = "";
    }

    toggleStrictLevel();

    const advToggle = document.getElementById('advancedToggle');
    if (advToggle?.checked) {
        const container = document.getElementById('characterRows');
        if (container) {
            const count = container.children.length;
            for (let i = 0; i < count; i++) {
                ['name','gender','age','demo'].forEach(f => {
                    if (isLocked(`adv_${f}_${i}`)) return;
                    const el = document.getElementById(`adv_${f}_${i}`);
                    if (el) { el.value = f === 'gender' ? 'RANDOM' : (f === 'age' ? 'RANDOM' : (f === 'name' ? '' : 'RANDOM')); el.disabled = false; el.style.opacity = ''; }
                });
            }
        }
    }

    if (!isLocked('locSelect')) renderLocationList();
    if (!isLocked('cameraSelect')) renderCameraList();
    if (!isLocked('aestheticSelect')) renderAestheticList();

    generatePromptNow();
}

function generatePromptCore() {
    try { _generate(); }
    catch(e) {
        console.error("Generate error:", e);
        const out = document.getElementById('textOutputNatural');
        if (out) out.textContent = `⚠️ Error: ${e.message}\n\nCek console untuk detail.`;
    }
}

function _generate() {
    const numVal       = getVal('numSelect');
    const ageVal       = getVal('ageSelect');
    const holidayVal   = getVal('holidaySelect');
    const eraVal       = getVal('eraSelect');
    const genderVal    = getVal('genderSelect');
    const cameraStyleVal = getVal('cameraSelect');
    const compVal      = getVal('compSelect');
    const locVal       = getVal('locSelect');
    const timeVal      = getVal('timeSelect');
    const weatherVal   = getVal('weatherSelect');
    const aestheticVal = getVal('aestheticSelect');
    const bodyTypeVal  = getVal('bodyTypeSelect');
    const hairAccVal   = getVal('hairAccSelect');
    const strictVal    = getVal('strictSelect');
    const customScenario = (document.getElementById('customScenarioInput')?.value || "").trim();
    const globalCustomName = (document.getElementById('customNameGlobal')?.value || "").trim();

    // Resolve number of subjects
    let numSubjects = numVal === "RANDOM" ? Math.floor(Math.random() * 6) + 1 : parseInt(numVal);
    if (isNaN(numSubjects) || numSubjects < 1) numSubjects = 1;
    if (genderVal === "COUPLE") numSubjects = 2;

    // Resolve holiday
    let activeHoliday = null;
    if (holidayVal === "RANDOM_HOLIDAY") {
        if (Math.random() > 0.65) activeHoliday = getRandom(Object.keys(holidayLocationDB));
    } else if (holidayVal !== "NONE") {
        activeHoliday = holidayVal;
    }

    // Resolve era
    let selectedEraId = eraVal !== "RANDOM" ? eraVal : getWeightedEra();

    // Resolve setting/location
    let setting = null;
    if (activeHoliday && holidayLocationDB[activeHoliday]) {
        setting = getRandom(holidayLocationDB[activeHoliday]);
    } else if (locVal !== "RANDOM") {
        const idx = parseInt(locVal);
        if (!isNaN(idx) && idx >= 0 && idx < settings.length) {
            setting = settings[idx];
            if (setting.era_id !== "TIMELESS_BASIC") selectedEraId = setting.era_id;
        }
    }

    if (!setting) {
        let pool = settings.filter(s => s.era_id === selectedEraId);
        if (pool.length === 0) pool = settings;
        // Mirror-friendly bias if needed
        if (cameraStyleVal.includes("MIRROR") || (cameraStyleVal === "RANDOM" && Math.random() < 0.08)) {
            const mirPool = pool.filter(s => isMirrorFriendly(s.env));
            if (mirPool.length > 0) pool = mirPool;
        }
        setting = getRandom(pool);
    }

    const envName = setting?.env || "";

    // Shot type
    let shotData = getShotTypeData(selectedEraId, cameraStyleVal, numSubjects, genderVal, customScenario, envName);

    // Environment-specific shot overrides (same logic preserved from original)
    const envUp = envName.toUpperCase();
    if (envUp.includes("WEDDING RECEPTION") && genderVal === "COUPLE" && cameraStyleVal !== "MATCH_POSE") {
        shotData.type = "POSED_SCENARIO"; shotData.pose = "STANDING SIDE-BY-SIDE, SMILING POLITELY AT CAMERA"; shotData.gaze = "DIRECT EYE CONTACT WITH CAMERA"; shotData.vibe = "FORMAL COUPLE PHOTO AT WEDDING";
    }
    if ((envUp.includes("BACK SEAT") || envUp.includes("INNOVA") || envUp.includes("NIGHT TAXI")) && (shotData.type === "CANDID_UNAWARE" || shotData.type === "ACCIDENTAL_AWKWARD_SHOT" || shotData.type === "CANDID_INTENTIONAL") && cameraStyleVal !== "MATCH_POSE") {
        shotData.pose = "TURNING HEAD HALFWAY BACK WITH SURPRISED-BUT-AMUSED EXPRESSION, HAND NEAR CHIN IMPERFECTLY POSED";
        shotData.vibe = "RAW, UNPLANNED 'KETAUAN DIFOTO', AUTHENTIC REAL-LIFE MOMENT, RUSHED SHOT";
        shotData.angle += ", MESSY FRAMING, SLIGHTLY TILTED, OFF-CENTER";
    }
    if (envUp.includes("ELEVATOR") && shotData.type === "MIRROR_SELFIE" && cameraStyleVal !== "MATCH_POSE") {
        shotData.pose = "STANDING HOLDING PHONE FOR A MIRROR SELFIE, PULLING DOWN TINY SUNGLASSES TO LOOK OVER THEM";
    }
    if ((envUp.includes("TRAIN") || envUp.includes("KRL")) && (shotData.type === "POSED_SCENARIO" || shotData.type === "CANDID_INTENTIONAL") && cameraStyleVal !== "MATCH_POSE") {
        shotData.pose = "MAKING A HEART SHAPE WITH HANDS OVER A DRAWN HEART ON THE FOGGY WINDOW";
        shotData.gaze = "SMILING SOFTLY OUT THE WINDOW";
    }
    if ((envUp.includes("CONCERT STAGE") || envUp.includes("PERFORMING")) && shotData.type === "POSED_SCENARIO" && !customScenario && cameraStyleVal !== "MATCH_POSE") {
        shotData.pose = getRandom(["PERFORMING ENERGETICALLY WITH A MICROPHONE","STANDING CONFIDENTLY ON STAGE LOOKING AT CROWD","SQUATTING AT EDGE OF STAGE POINTING AT CAMERA"]);
        shotData.vibe = "ROCKSTAR CONCERT PERFORMANCE VIBE";
    }
    if (envUp.includes("PHOTOGRAPHY PIT") && cameraStyleVal !== "MATCH_POSE") {
        shotData.angle = "LOW ANGLE SHOT, LOOKING UP AT SUBJECT ON STAGE"; shotData.vibe = "PROFESSIONAL CONCERT PHOTOGRAPHY VIBE";
        if (shotData.type === "POSED_SCENARIO" && !customScenario) shotData.pose = "LEANING OVER THE EDGE OF STAGE LOOKING DOWN AT CAMERA INTENSELY";
    }
    if (envUp.includes("BEACH") && !envUp.includes("NIGHT") && shotData.type !== "CANDID_UNAWARE" && !customScenario && cameraStyleVal !== "MATCH_POSE") {
        shotData.pose = "GIVING A DOUBLE THUMBS UP ENTHUSIASTICALLY WITH A BIG SMILE";
    }
    if (envUp.includes("WARTEG") && (shotData.type === "FRONT_CAMERA_SELFIE" || shotData.type === "CLOSE_UP_SELFIE") && cameraStyleVal !== "MATCH_POSE") {
        shotData.angle = "WIDE ANGLE DISTORTED SELFIE WITH FINGER PARTIALLY BLOCKING LENS EDGE";
        shotData.pose = "FUNNY AWKWARD EXPRESSION, TOO CLOSE TO CAMERA";
    }
    if (cameraStyleVal === "MATCH_POSE") {
        shotData.type  = "REFERENCE_DRIVEN_POSE_SHOT";
        shotData.pose  = "EXACTLY MATCH THE SUBJECT'S POSE, POSTURE, HAND PLACEMENT, AND ACCESSORY INTERACTION AS SHOWN IN THE PROVIDED REFERENCE IMAGE. STRICTLY ENFORCE THIS.";
        shotData.angle = "MATCH THE EXACT CAMERA ANGLE, FORESHORTENING, AND PERSPECTIVE AS SHOWN IN THE PROVIDED REFERENCE IMAGE.";
        shotData.focal = "MATCH REFERENCE LENS";
        shotData.gaze  = "MATCH THE EXACT GAZE FROM THE REFERENCE IMAGE";
    }

    // Composition
    let finalComposition = "NATURAL AMATEUR COMPOSITION, UNPLANNED FRAMING";
    if (cameraStyleVal === "MATCH_POSE") {
        finalComposition = "STRICTLY MATCH THE COMPOSITION AND FRAMING OF THE REFERENCE IMAGE";
    } else if (compVal !== "NONE") {
        let compId = compVal === "RANDOM" ? getRandom(Object.keys(compositionsRules)) : compVal;
        if (compositionsRules[compId]) finalComposition = compositionsRules[compId];
    }

    // Time / weather
    const timeStr     = timeVal !== "RANDOM" ? timeVal : getRandom(["MORNING","AFTERNOON","GOLDEN_HOUR","NIGHT"]);
    const weatherStr  = weatherVal !== "RANDOM" ? weatherVal : getRandom(["CLEAR","OVERCAST","RAINING"]);
    const timeDescMap = { MORNING:"MORNING LIGHT, CRISP AND FRESH", AFTERNOON:"HARSH AFTERNOON SUN, BRIGHT DAYLIGHT", GOLDEN_HOUR:"GOLDEN HOUR, WARM SUNSET GLOW, LONG SHADOWS", NIGHT:"NIGHT TIME, ILLUMINATED BY ARTIFICIAL STREET OR NEON LIGHTS" };
    const weatherDescMap = { CLEAR:"CLEAR TROPICAL WEATHER", OVERCAST:"OVERCAST AND GLOOMY, CLOUDY SKY, FLAT MOODY LIGHTING", RAINING:"RAINING HEAVILY, WET SURFACES REFLECTING LIGHT, VISIBLE RAINDROPS" };

    // Lighting
    let lighting = getRandom(lightings);
    if (envUp.includes("RESTROOM") || envUp.includes("BATHROOM") || envUp.includes("TOILET")) {
        lighting = lightings.find(l => l.source.includes("VANITY")) || lighting;
    }
    if (timeStr === "NIGHT" && lighting.source.includes("SUNLIGHT")) {
        lighting = { source:"ARTIFICIAL NEON OR STREET LAMPS", dir:"OMNIDIRECTIONAL LOW", qual:"HIGH CONTRAST, NOISY SHADOWS, ORANGE OR BLUE CAST" };
    }
    if (envUp.includes("CONCERT STAGE") || envUp.includes("PHOTOGRAPHY PIT")) {
        lighting = { source:"INTENSE STAGE LIGHTING, SPOTLIGHTS, AND LASERS", dir:"DRAMATIC RIM", qual:"DRAMATIC RIM LIGHTING, HIGH CONTRAST, COLORFUL HUES" };
    }

    // Aesthetic filter
    let activeAesthetic = aestheticVal;
    if (activeAesthetic === "RANDOM") {
        activeAesthetic = Math.random() < 0.5 ? getRandom(Object.keys(aestheticFilters)) : "DEFAULT";
    }

    let finalRender   = "PHOTOREALISTIC RAW UPLOAD, LOCAL INDONESIAN VIBE, AMATEUR SMARTPHONE SHOT";
    let finalFlaws    = selectedEraId === "GRUNGE_1990S" ? "HEAVY FILM GRAIN, LIGHT LEAKS" : selectedEraId === "Y2K_2000S" ? "LOW RES PIXELATION, NOISY" : "SLIGHTLY COMPRESSED SOCIAL MEDIA QUALITY";
    let finalCamModel = shotData.cameraModel;

    if (activeAesthetic !== "DEFAULT") {
        const aes = aestheticFilters[activeAesthetic];
        if (aes) {
            lighting = { source: aes.lighting, dir: lighting.dir, qual: aes.render };
            finalRender   = aes.render + ", RETAINING LOCAL INDONESIAN CONTEXT";
            finalFlaws    = aes.render;
            if (cameraStyleVal !== "MATCH_POSE") finalCamModel = aes.cameraType;
        }
    }

    // Night / weather flaws
    if (timeStr === "NIGHT" || envUp.includes("CLUB") || envUp.includes("DARK")) {
        finalFlaws += ", HEAVY ISO NOISE, COLOR FRINGING, GRAINY SHADOWS, POOR LOW-LIGHT ARTIFACTS";
    }
    if (envUp.includes("PHONE SCREEN")) {
        lighting = { source:"BLUE LIGHT FROM SMARTPHONE SCREEN", dir:"FRONTAL", qual:"HARSH GLOW ON FACE, SURROUNDINGS PITCH BLACK" };
    }

    // Aspect ratio
    let aspectRatio = getRandom(["9:16 (VERTICAL TIKTOK/REELS)","3:4 (SMARTPHONE DEFAULT)","1:1 (OLD INSTAGRAM)"]);
    if (selectedEraId === "HIPSTER_2010S" || activeAesthetic === "OLD_SMARTPHONE" || activeAesthetic === "ANALOG_AIRY") aspectRatio = "1:1 (OLD INSTAGRAM/POLAROID)";

    // Advanced panel check
    const isAdvanced = document.getElementById('advancedToggle')?.checked;

    // Build per-person descriptions
    const subjectDescriptions  = [];
    const outfitDescriptions   = [];
    const accDescriptions      = [];
    const appearanceDescriptions = [];

    for (let i = 0; i < numSubjects; i++) {
        let pGenderVal = genderVal;
        let pAgeVal    = ageVal;
        let pDemoVal   = "RANDOM";
        let customName = i === 0 ? globalCustomName : "";

        if (isAdvanced) {
            const advGen  = document.getElementById(`adv_gender_${i}`);
            const advAge  = document.getElementById(`adv_age_${i}`);
            const advDemo = document.getElementById(`adv_demo_${i}`);
            const advName = document.getElementById(`adv_name_${i}`);
            if (advGen  && !advGen.disabled)  pGenderVal = advGen.value;
            if (advAge  && !advAge.disabled)  pAgeVal    = advAge.value;
            if (advDemo && !advDemo.disabled) pDemoVal   = advDemo.value;
            if (advName) customName = advName.value.trim();
        } else {
            if (genderVal === "COUPLE") pGenderVal = i === 0 ? "MALE" : "FEMALE";
        }

        const pSubj   = buildSubject(pGenderVal, pAgeVal, bodyTypeVal);
        const pDemo   = pDemoVal !== "RANDOM" ? pDemoVal : getRandom(demographics);
        const wardrobe = buildWardrobe(pSubj.genderId, selectedEraId, activeHoliday, envName, customName, shotData.type);

        // Hair/acc override for strict match
        if (hairAccVal === "MATCH_STRICT") {
            wardrobe.hair = "EXACTLY MATCHING REFERENCE IMAGE HAIR";
            wardrobe.acc  = "EXACTLY MATCHING REFERENCE IMAGE ACCESSORIES";
        }

        // Beauty expression
        let expr = getRandom(beautyTypes);
        const isSelfieType = ["FRONT_CAMERA_SELFIE","CLOSE_UP_SELFIE","MIRROR_SELFIE","CANDID_INTENTIONAL","POSED_SCENARIO","POV_ULTRAWIDE_SELFIE"].includes(shotData.type);
        if (isSelfieType && !customScenario && cameraStyleVal !== "MATCH_POSE") {
            if (pSubj.genderId === "FEMALE" && Math.random() < 0.6) {
                expr += ", " + getRandom(["PLAYFULLY BITING LOWER LIP","STICKING TONGUE OUT PLAYFULLY","WINKING AT CAMERA","CUTE POUTING LIPS","LAUGHING WITH EYES SQUINTED CLOSED"]);
            } else if (pSubj.genderId === "MALE" && Math.random() < 0.3) {
                expr += ", " + getRandom(["MAKING A SILLY DUCK FACE","SMILING WARMLY","SERIOUS COOL EXPRESSION"]);
            }
        }

        const subjectLine = customName
            ? `${customName.toUpperCase()}, A ${pSubj.genderId}, WITH ${wardrobe.hair} AND ${expr}`
            : `${pSubj.subjectName} (${pDemo}), WITH ${wardrobe.hair} AND ${expr}`;

        const isHijab = wardrobe.hair && (wardrobe.hair.includes("HIJAB") || wardrobe.hair.includes("PASHMINA"));
        const appearance = activeHoliday
            ? `FESTIVE ${activeHoliday.replace(/_/g,' ')} HOLIDAY OUTFIT${isHijab ? ', MODEST/COVERED UP' : ''}`
            : (isHijab ? "MODEST CASUAL EVERYDAY WEAR, COVERED UP" : "CASUAL EVERYDAY WEAR");

        subjectDescriptions.push(subjectLine);
        outfitDescriptions.push(`${wardrobe.top}, ${wardrobe.bottom}, AND ${wardrobe.shoe}`);
        accDescriptions.push(wardrobe.acc);
        appearanceDescriptions.push(appearance);
    }

    const finalSubject   = numSubjects === 1 ? subjectDescriptions[0] : `GROUP OF ${numSubjects} PEOPLE: ` + subjectDescriptions.map((d,i) => `[P${i+1}] ${d}`).join(" | ");
    const finalOutfit    = numSubjects === 1 ? outfitDescriptions[0]  : outfitDescriptions.map((d,i) => `[P${i+1}] ${d}`).join(" | ");
    const finalAcc       = numSubjects === 1 ? accDescriptions[0]     : accDescriptions.map((d,i) => `[P${i+1}] ${d}`).join(" | ");
    const finalAppearance= numSubjects === 1 ? appearanceDescriptions[0] : "MIXED GROUP STYLES";

    const styleName = `INDONESIAN ${activeHoliday ? activeHoliday : selectedEraId} ${shotData.type}${activeAesthetic !== "DEFAULT" ? ' + ' + activeAesthetic : ''}`;

    // Negative prompt
    let negPrompt = "professional studio lighting, DSLR quality, perfect composition, overly clean, over-smooth skin, beauty filter, cinematic lighting, sharp perfect image, CGI, 3D render";
    const selfieTypes = ["FRONT_CAMERA_SELFIE","CLOSE_UP_SELFIE","CANDID_INTENTIONAL","POSED_SCENARIO"];
    const phoneEnvs   = ["ELEVATOR","STADIUM","BRIDGE","DARK ROOM","PHONE SCREEN"];
    const hasPhoneEnv = phoneEnvs.some(e => envUp.includes(e));
    if (selfieTypes.includes(shotData.type) && !hasPhoneEnv && cameraStyleVal !== "MATCH_POSE") {
        negPrompt = "showing phone in hand, holding camera, mobile phone in frame, mirror reflection, " + negPrompt;
    } else if (shotData.type === "CANDID_UNAWARE") {
        negPrompt = "holding camera to take photo, selfie arm, mirror reflection, " + negPrompt;
    }
    if (hairAccVal === "MATCH_STRICT" || strictVal === "STRICT") {
        negPrompt += ", double glasses, changing hair style, different accessories, adding hats";
    }
    if (cameraStyleVal === "MATCH_POSE") {
        negPrompt += ", flat angle, eye-level if reference shows extreme angle, mirror reflection";
    }
    if (shotData.type === "POV_ULTRAWIDE_SELFIE") {
        negPrompt += ", flat angle, eye-level, mirror reflection";
    }

    // Build photo JSON
    const imagePromptData = {
        META: {
            STYLE_NAME:  styleName,
            ASPECT_RATIO: aspectRatio,
            PROMPT_PREFIX: `IMG_INDO_${activeHoliday || selectedEraId}_${shotData.type}`
        },
        CAMERA: {
            MODEL:           finalCamModel,
            FOCAL_LENGTH:    shotData.focal,
            ANGLE:           shotData.angle,
            COMPOSITION:     finalComposition,
            SHOT_TYPE:       `AMATEUR SNAPSHOT, ${shotData.type}`
        },
        SUBJECT: {
            PRIMARY:         finalSubject,
            POSE:            shotData.pose,
            GAZE:            shotData.gaze
        },
        WARDROBE: {
            THEME:           activeHoliday ? `${activeHoliday} HOLIDAY ATTIRE` : selectedEraId,
            OUTFITS:         finalOutfit,
            ACCESSORIES:     finalAcc,
            APPEARANCE:      finalAppearance
        },
        ENVIRONMENT: {
            LOCATION:        envName,
            TIME_OF_DAY:     timeDescMap[timeStr] || "DAYLIGHT",
            WEATHER:         weatherDescMap[weatherStr] || "CLEAR TROPICAL",
            ARCH_DETAILS:    setting?.arch || "",
            PROPS:           setting?.props || "",
            VIBE:            shotData.vibe
        },
        LIGHTING: {
            SOURCE:    lighting.source,
            DIRECTION: lighting.dir,
            QUALITY:   lighting.qual
        },
        RENDERING: {
            ENGINE:          finalRender,
            AESTHETIC_FLAWS: finalFlaws,
            POSTPROCESSING:  "UNEDITED CAMERA ROLL LOOK"
        },
        NEGATIVE_PROMPT: negPrompt
    };

    if (cameraStyleVal === "MATCH_POSE") {
        imagePromptData.IMAGE_REF_INSTRUCTION = "ControlNet Pose/Depth enforcement: STRICTLY replicate the exact anatomical posture, camera angle, perspective, and item placements as seen in the reference image. Identity, environment, and clothing adapt to the text prompt.";
    }
    if (strictVal === "STRICT") {
        const sw = parseFloat(document.getElementById('strictWeight')?.value || "1.0");
        imagePromptData.AI_ENFORCEMENT = {
            STRICT_MODE: "ENABLED",
            REFERENCE_STRENGTH: sw,
            INSTRUCTION: "Enable strict facial consistency mode. Prioritize facial features from the provided reference image. Maintain subject identity while only adapting pose, lighting, and background. Do not alter core facial structure.",
            NEGATIVE_PROMPT: negPrompt + ", deformed, generic faces, morphed bodies, fused people, changing facial features"
        };
        delete imagePromptData.NEGATIVE_PROMPT;
    }

    // Build natural prompt
    const t = (s) => (s || "").toLowerCase();
    let natural = `A ${t(imagePromptData.CAMERA.SHOT_TYPE)} featuring ${t(finalSubject)}. `;
    natural += `The subject is ${t(shotData.pose)}, ${t(shotData.gaze)}. `;
    natural += `Wardrobe: ${t(finalOutfit)}`;
    if (finalAcc && !finalAcc.toUpperCase().includes("NONE")) natural += `, accessorized with ${t(finalAcc)}`;
    natural += `. Overall appearance: ${t(finalAppearance)}. `;
    natural += `Scene is at ${t(envName)} during ${t(timeDescMap[timeStr])} in ${t(weatherDescMap[weatherStr])}. `;
    if (setting?.arch) natural += `Setting details: ${t(setting.arch)}. Props: ${t(setting.props)}. `;
    natural += `Vibe: ${t(shotData.vibe)}. `;
    natural += `Shot uses ${t(finalComposition)}, captured with ${t(finalCamModel)}, ${t(shotData.focal)}, from ${t(shotData.angle)}. `;
    natural += `Lighting: ${t(lighting.source)} (${t(lighting.dir)}), creating ${t(lighting.qual)}. `;
    natural += `Final image has a ${t(finalRender)} look with ${t(finalFlaws)}.`;
    natural += `\n\nNegative Prompt: ${negPrompt}`;
    if (strictVal === "STRICT") natural += `\n\nMANDATORY: Enable strict facial consistency mode. Prioritize facial identity from the provided reference image. Do not mutate features.`;

    // Build video JSON
    const videoScenes = numSubjects === 1
        ? ["SUBJECT TALKING ANIMATEDLY IN BAHASA INDONESIA SLANG","SUBJECT WIPING SWEAT CASUALLY IN TROPICAL HEAT","LIP-SYNCING TO VIRAL TIKTOK AUDIO","SUBJECT SCROLLING PHONE THEN LOOKING UP TO CAMERA"]
        : genderVal === "COUPLE"
            ? ["COUPLE LAUGHING AND JOKING AROUND TOGETHER","COUPLE WALKING CLOSE TOGETHER","ROMANTIC CASUAL INTERACTION"]
            : [`GROUP OF ${numSubjects} FRIENDS LAUGHING TOGETHER","GROUP LIP-SYNCING TO VIRAL TIKTOK AUDIO","MESSY GROUP INTERACTION, PUSHING EACH OTHER PLAYFULLY`];

    const videoData = {
        WORKFLOW: "USE IMAGE GENERATED FROM JSON PHOTO AS STARTING FRAME (IMAGE-TO-VIDEO)",
        DURATION: getRandom(["5 SECONDS","7 SECONDS","10 SECONDS"]),
        CAMERA_MOVEMENT: getRandom(["SHAKY HANDHELD RECORDING","QUICK SNAPCHAT ZOOM IN/OUT","CASUAL PAN AROUND THE SCENE","STATIC BUT HAND SHAKING SLIGHTLY"]),
        SCENE_DYNAMICS: getRandom(videoScenes),
        FPS_STYLE: selectedEraId === "MODERN_2020S" ? "60FPS SMARTPHONE VIDEO SMOOTH" : "30FPS CHOPPY DIGITAL VIDEO",
        TEXT_PROMPT: `Amateur phone recording in Indonesia during ${timeStr.toLowerCase().replace('_',' ')}. Weather: ${weatherStr.toLowerCase()}. ${getRandom(videoScenes)}. Raw and authentic feel.`
    };
    if (strictVal === "STRICT") videoData.TEXT_PROMPT += " STRICT: Do not mutate subject features.";

    // Write outputs
    document.getElementById('jsonOutputPhoto').textContent = JSON.stringify(imagePromptData, null, 2);
    document.getElementById('textOutputNatural').textContent = natural;
    document.getElementById('jsonOutputVideo').textContent = JSON.stringify(videoData, null, 2);

    // Reset copy buttons
    ['copyBtnNatural','copyBtnPhoto','copyBtnVideo'].forEach(id => {
        const btn = document.getElementById(id);
        if (btn) {
            btn.innerHTML = '<i class="fa-regular fa-copy"></i> Salin';
            btn.className = btn.className.replace('bg-red-600 hover:bg-red-500','bg-slate-700 hover:bg-slate-600');
        }
    });

    // Flash the generate button green
    const genBtn = document.getElementById('generateBtn');
    if (genBtn) {
        genBtn.innerHTML = '<i class="fa-solid fa-check text-2xl"></i> DIPERBARUI!';
        genBtn.classList.replace('bg-red-600','bg-green-600');
        genBtn.classList.replace('hover:bg-red-500','hover:bg-green-500');
        setTimeout(() => {
            genBtn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles text-2xl"></i> GENERATE PROMPT';
            genBtn.classList.replace('bg-green-600','bg-red-600');
            genBtn.classList.replace('hover:bg-green-500','hover:bg-red-500');
        }, 800);
    }
}

// ============================================================
// CLIPBOARD
// ============================================================
async function copyToClipboard(type) {
    const map = { natural:'textOutputNatural', photo:'jsonOutputPhoto', video:'jsonOutputVideo' };
    const btnMap = { natural:'copyBtnNatural', photo:'copyBtnPhoto', video:'copyBtnVideo' };
    const content = document.getElementById(map[type])?.textContent || "";
    if (!content || content.startsWith('//')) return;

    const success = () => {
        const btn = document.getElementById(btnMap[type]);
        if (!btn) return;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Tersalin!';
        btn.classList.replace('bg-slate-700','bg-red-600');
        btn.classList.replace('hover:bg-slate-600','hover:bg-red-500');
        setTimeout(() => {
            btn.innerHTML = '<i class="fa-regular fa-copy"></i> Salin';
            btn.classList.replace('bg-red-600','bg-slate-700');
            btn.classList.replace('hover:bg-red-500','hover:bg-slate-600');
        }, 2000);
    };

    if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(content).then(success).catch(console.error);
    } else {
        const ta = document.createElement("textarea");
        ta.value = content;
        ta.style.cssText = "position:fixed;left:-9999px;top:-9999px";
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); success(); } catch(e) { console.error(e); }
        document.body.removeChild(ta);
    }
}

    setupListDelegation('locListContainer',    'locSelect');

    renderLocationList();

    generatePromptNow();
};
