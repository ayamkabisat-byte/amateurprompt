<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indonesian Amateur Shot Generator V4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ===== ENHANCED DESIGN SYSTEM ===== */
        * {
            transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
                animation: none !important;
            }
        }
        body {
            background: linear-gradient(145deg, #0b1120 0%, #0f172a 100%);
            color: #e2e8f0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        /* Smooth fade-in for content */
        #mainContent {
            animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
        }
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Custom scrollbar */
        pre, .listbox-scroll {
            scrollbar-width: thin;
            scrollbar-color: #ef4444 #1e293b;
        }
        pre::-webkit-scrollbar, .listbox-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        pre::-webkit-scrollbar-track, .listbox-scroll::-webkit-scrollbar-track { background: #1e293b; border-radius: 12px; }
        pre::-webkit-scrollbar-thumb, .listbox-scroll::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 12px; border: 2px solid #1e293b; }
        pre::-webkit-scrollbar-thumb:hover, .listbox-scroll::-webkit-scrollbar-thumb:hover { background: #f87171; }

        /* Interactive elements */
        select, input, .radio-label, button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        select:focus, input:focus, button:focus-visible, .radio-input:focus-visible + div {
            outline: 2px solid #ef4444;
            outline-offset: 2px;
            border-radius: 6px;
        }
        .radio-label {
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
        }
        .radio-label:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px -2px rgba(0,0,0,0.3);
        }
        .radio-label:active {
            transform: translateY(0);
        }

        /* Lock icon animations */
        .lock-icon {
            transition: color 0.2s, transform 0.15s, text-shadow 0.2s;
            cursor: pointer;
            padding: 4px;
            border-radius: 9999px;
        }
        .lock-icon:hover {
            transform: scale(1.15);
            background: rgba(255,255,255,0.05);
        }
        .lock-icon.locked {
            color: #ef4444;
            text-shadow: 0 0 8px rgba(239,68,68,0.5);
        }
        .lock-icon.unlocked {
            color: #64748b;
        }

        /* Cards & containers */
        .bg-slate-800, .bg-slate-900 {
            backdrop-filter: blur(4px);
            background-color: rgba(30, 41, 59, 0.85) !important;
            border: 1px solid rgba(71, 85, 105, 0.3);
        }
        .shadow-lg {
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.4), 0 4px 8px -2px rgba(0,0,0,0.2);
        }
        .listbox-scroll {
            scroll-behavior: smooth;
        }

        /* Advanced panel rows */
        #characterRows > div {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #characterRows > div:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -8px rgba(0,0,0,0.5);
            border-color: #ef4444 !important;
        }

        /* Generate button pulse */
        @keyframes gentlePulse {
            0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
        }
        .pulse-attention {
            animation: gentlePulse 2s infinite;
        }

        /* Loading spinner (optional, used when generate takes time) */
        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Disabled states */
        select:disabled, input:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
            background-color: #1e293b;
            border-color: #475569 !important;
        }
        .locked-border {
            border-color: #ef4444 !important;
            opacity: 0.7;
            pointer-events: none;
            box-shadow: 0 0 0 1px rgba(239,68,68,0.2);
        }

        /* Typography enhancements */
        h1 {
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
            letter-spacing: -0.02em;
        }
        pre {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            line-height: 1.6;
            tab-size: 2;
        }
        /* Accessible focus for lock icon (keyboard) */
        .lock-icon:focus-visible {
            outline: 2px solid #fbbf24;
            outline-offset: 2px;
        }
        /* Responsive adjustments */
        @media (max-width: 640px) {
            .grid-cols-1.sm\:grid-cols-2 { gap: 0.75rem; }
            .p-5 { padding: 1rem; }
        }
    </style>

    <!-- ============================================================ -->
    <!-- DATA FILES — order matters (dependencies first)              -->
    <!-- ============================================================ -->
    <script src="data/demographics.js"></script>
    <script src="data/wardrobe.js"></script>
    <script src="data/aesthetics.js"></script>
    <script src="data/locations.js"></script>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

<div id="mainContent" class="w-full max-w-7xl">

    <!-- HEADER -->
    <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold text-white mb-3 flex items-center justify-center gap-2">
            <i class="fa-solid fa-camera-retro text-red-500 drop-shadow-md"></i> 
            Indonesian Amateur Shot V4.0
        </h1>
        <p class="text-slate-400 text-sm md:text-base max-w-2xl mx-auto">
            <i class="fa-regular fa-gem mr-1 text-red-400/70"></i>
            Expanded Database · Bug‑Fixed · Multi‑File Architecture · Ratusan Skenario.
        </p>
    </div>

    <!-- ============================================================ -->
    <!-- GROUP 1: BASIC DEMOGRAPHICS                                  -->
    <!-- ============================================================ -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 bg-slate-800/90 p-5 rounded-xl border border-slate-700/80 shadow-xl text-sm mb-4 backdrop-blur-sm">

        <div>
            <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-solid fa-user-group mr-1"></i>Jumlah Orang</span>
                <i role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleLock('numSelect', this)" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleLock('numSelect',this); }"
                   aria-label="Kunci jumlah orang"></i>
            </label>
            <select id="numSelect" onchange="onNumOrGenderChange()" class="w-full bg-slate-900/90 text-slate-200 border border-slate-600 rounded-lg p-2.5 outline-none focus:border-red-500 cursor-pointer hover:border-slate-500 transition-colors">
                <option value="RANDOM">🎲 Acak (1-6)</option>
                <option value="1">1 Orang (Solo)</option>
                <option value="2">2 Orang (Duo)</option>
                <option value="3">3 Orang (Grup Kecil)</option>
                <option value="4">4 Orang (Grup)</option>
                <option value="5">5 Orang (Grup Besar)</option>
                <option value="6">6 Orang (Grup Besar)</option>
            </select>
        </div>

        <div>
            <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-regular fa-calendar mr-1"></i>Rentang Usia</span>
                <i role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleLock('ageSelect', this)" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleLock('ageSelect',this); }"
                   aria-label="Kunci rentang usia"></i>
            </label>
            <select id="ageSelect" onchange="triggerGenerate()" class="w-full bg-slate-900/90 text-slate-200 border border-slate-600 rounded-lg p-2.5 outline-none focus:border-red-500 cursor-pointer hover:border-slate-500 transition-colors">
                <option value="RANDOM">🎲 Acak Usia</option>
                <option value="TEENAGER">Remaja (13-19)</option>
                <option value="YOUNG_ADULT">Dewasa Muda (20-29)</option>
                <option value="ADULT">Dewasa (30-40)</option>
                <option value="MATURE">Paruh Baya (40+)</option>
            </select>
        </div>

        <div>
            <label class="flex justify-between items-center text-yellow-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-solid fa-star mr-1"></i>Tipe Badan</span>
                <i role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleLock('bodyTypeSelect', this)" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleLock('bodyTypeSelect',this); }"
                   aria-label="Kunci tipe badan"></i>
            </label>
            <select id="bodyTypeSelect" onchange="triggerGenerate()" class="w-full bg-slate-900/90 text-yellow-200 border border-yellow-600/70 rounded-lg p-2.5 outline-none focus:border-yellow-400 cursor-pointer hover:border-yellow-500 transition-colors">
                <option value="MATCH">🖼️ Sesuai Foto (Default)</option>
                <option value="RANDOM">🎲 Acak Badan</option>
                <option value="SLIM AND PETITE">Lebih Slim / Kurus</option>
                <option value="THICK AND CURVY">Curvy / Berisi</option>
                <option value="MUSCULAR AND TONED">Berotot / Atletis</option>
                <option value="CHUBBY">Chubby / Gemuk</option>
            </select>
        </div>

        <div>
            <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-solid fa-venus-mars mr-1"></i>Gender</span>
                <i role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleLock('genderSelect', this)" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleLock('genderSelect',this); }"
                   aria-label="Kunci gender"></i>
            </label>
            <select id="genderSelect" onchange="onNumOrGenderChange()" class="w-full bg-slate-900/90 text-slate-200 border border-slate-600 rounded-lg p-2.5 outline-none focus:border-red-500 cursor-pointer hover:border-slate-500 transition-colors">
                <option value="RANDOM">🎲 Acak / Campur</option>
                <option value="MALE">Semua Pria</option>
                <option value="FEMALE">Semua Wanita</option>
                <option value="COUPLE">Couple (Pria & Wanita)</option>
            </select>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- GROUP 2: BIG LIST BOXES                                      -->
    <!-- ============================================================ -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-slate-800/90 p-5 rounded-xl border border-slate-700/80 shadow-xl text-sm mb-4 backdrop-blur-sm">

        <!-- Era + Location -->
        <div class="flex flex-col h-[400px]">
            <label class="flex justify-between items-center text-blue-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-solid fa-clock-rotate-left mr-1"></i>Era / Zaman</span>
                <i role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleLock('eraSelect', this)" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleLock('eraSelect',this); }"
                   aria-label="Kunci era"></i>
            </label>
            <select id="eraSelect" onchange="renderLocationList(); triggerGenerate();"
                class="w-full bg-slate-900/90 text-blue-200 border border-blue-600/70 rounded-lg p-2.5 outline-none focus:border-blue-400 cursor-pointer font-semibold mb-3 shrink-0 hover:border-blue-500 transition-colors">
                <option value="RANDOM">🎲 Acak Era Otomatis</option>
                <option value="MODERN_2020S">2020s (Modern / Gen-Z)</option>
                <option value="TIMELESS_BASIC">Timeless / Basic Kasual</option>
                <option value="HIPSTER_2010S">2010s (Hipster/Indie)</option>
                <option value="Y2K_2000S">2000s (Y2K/Warnet)</option>
                <option value="GRUNGE_1990S">1990s (Grunge/Retro)</option>
            </select>

            <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-solid fa-map-location-dot mr-1"></i>Lokasi Spesifik</span>
                <i id="locLockIcon" role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleLocLock()" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleLocLock(); }"
                   aria-label="Kunci lokasi"></i>
            </label>
            <input type="hidden" id="locSelect" value="RANDOM">
            <div id="locListContainer" class="flex-1 overflow-y-auto listbox-scroll bg-slate-900/80 border border-slate-600/80 rounded-lg p-2 flex flex-col gap-1.5 shadow-inner"></div>
        </div>

        <!-- Camera -->
        <div class="flex flex-col h-[400px]">
            <label class="flex justify-between items-center text-orange-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-solid fa-video mr-1"></i>Gaya Kamera & Angle</span>
                <i id="camLockIcon" role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleCamLock()" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleCamLock(); }"
                   aria-label="Kunci gaya kamera"></i>
            </label>
            <input type="hidden" id="cameraSelect" value="RANDOM">
            <div id="cameraListContainer" class="flex-1 overflow-y-auto listbox-scroll bg-slate-900/80 border border-orange-600/50 rounded-lg p-2 flex flex-col gap-1.5 shadow-inner"></div>
        </div>

        <!-- Aesthetic -->
        <div class="flex flex-col h-[400px]">
            <label class="flex justify-between items-center text-purple-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-solid fa-wand-magic-sparkles mr-1"></i>Filter / Aesthetic</span>
                <i id="aesLockIcon" role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleAesLock()" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleAesLock(); }"
                   aria-label="Kunci aesthetic"></i>
            </label>
            <input type="hidden" id="aestheticSelect" value="DEFAULT">
            <div id="aesListContainer" class="flex-1 overflow-y-auto listbox-scroll bg-slate-900/80 border border-purple-600/50 rounded-lg p-2 flex flex-col gap-1.5 shadow-inner"></div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- GROUP 3: TECHNICALS & SCENARIO                               -->
    <!-- ============================================================ -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 bg-slate-800/90 p-5 rounded-xl border border-slate-700/80 shadow-xl text-sm items-end mb-4 backdrop-blur-sm">

        <div>
            <label class="flex justify-between items-center text-cyan-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-solid fa-crop-simple mr-1"></i>Komposisi Frame</span>
                <i role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleLock('compSelect', this)" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleLock('compSelect',this); }"
                   aria-label="Kunci komposisi"></i>
            </label>
            <select id="compSelect" onchange="triggerGenerate()" class="w-full bg-slate-900/90 text-cyan-200 border border-cyan-700/70 rounded-lg p-2.5 outline-none focus:border-cyan-400 cursor-pointer hover:border-cyan-500 transition-colors">
                <option value="NONE">❌ Tidak Ada (Amateur Style)</option>
                <option value="RANDOM">🎲 Acak (Otomatis)</option>
                <option value="GOLDEN_RATIO">Golden Ratio</option>
                <option value="RULE_OF_THIRDS">Rule of Thirds</option>
                <option value="SYMMETRY">Symmetry & Balance</option>
                <option value="GOLDEN_TRIANGLE">Golden Triangle</option>
                <option value="DIAGONAL">Diagonal</option>
                <option value="FILL_FRAME">Fill the Frame</option>
                <option value="NEGATIVE_SPACE">Negative Space</option>
                <option value="LEADING_LINES">Leading Lines</option>
                <option value="FRAMING">Natural Framing</option>
                <option value="CENTERED_BOLD">Centered Bold</option>
            </select>
        </div>

        <div>
            <label class="flex justify-between items-center text-yellow-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-solid fa-calendar-star mr-1"></i>Hari Raya / Perayaan</span>
                <i role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleLock('holidaySelect', this)" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleLock('holidaySelect',this); }"
                   aria-label="Kunci hari raya"></i>
            </label>
            <select id="holidaySelect" onchange="triggerGenerate()" class="w-full bg-slate-900/90 text-yellow-200 border border-yellow-600/70 rounded-lg p-2.5 outline-none focus:border-yellow-400 cursor-pointer hover:border-yellow-500 transition-colors">
                <option value="NONE">❌ Tidak Ada (Biasa)</option>
                <option value="RANDOM_HOLIDAY">🎲 Acak (Inkl. Libur)</option>
                <option value="EID">Idul Fitri (Lebaran)</option>
                <option value="CHRISTMAS">Natal (Christmas)</option>
                <option value="IMLEK">Imlek (Lunar New Year)</option>
                <option value="GALUNGAN">Galungan (Bali)</option>
                <option value="HUT_RI">HUT RI (17 Agustus)</option>
                <option value="NYEPI">Nyepi (Bali Day of Silence)</option>
            </select>
        </div>

        <div>
            <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-regular fa-clock mr-1"></i>Waktu (Time)</span>
                <i role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleLock('timeSelect', this)" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleLock('timeSelect',this); }"
                   aria-label="Kunci waktu"></i>
            </label>
            <select id="timeSelect" onchange="triggerGenerate()" class="w-full bg-slate-900/90 text-slate-200 border border-slate-600 rounded-lg p-2.5 outline-none focus:border-red-500 cursor-pointer hover:border-slate-500 transition-colors">
                <option value="RANDOM">🎲 Acak Waktu</option>
                <option value="MORNING">Pagi Hari</option>
                <option value="AFTERNOON">Siang Bolong</option>
                <option value="GOLDEN_HOUR">Sore (Golden Hour)</option>
                <option value="NIGHT">Malam Hari (Night)</option>
            </select>
        </div>

        <div>
            <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-solid fa-cloud-sun mr-1"></i>Cuaca (Weather)</span>
                <i role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleLock('weatherSelect', this)" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleLock('weatherSelect',this); }"
                   aria-label="Kunci cuaca"></i>
            </label>
            <select id="weatherSelect" onchange="triggerGenerate()" class="w-full bg-slate-900/90 text-slate-200 border border-slate-600 rounded-lg p-2.5 outline-none focus:border-red-500 cursor-pointer hover:border-slate-500 transition-colors">
                <option value="RANDOM">🎲 Acak Cuaca</option>
                <option value="CLEAR">Cerah / Normal</option>
                <option value="OVERCAST">Mendung (Gloomy)</option>
                <option value="RAINING">Hujan (Wet)</option>
            </select>
        </div>

        <div>
            <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-solid fa-scissors mr-1"></i>Rambut & Aksesoris</span>
                <i role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleLock('hairAccSelect', this)" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleLock('hairAccSelect',this); }"
                   aria-label="Kunci rambut aksesoris"></i>
            </label>
            <select id="hairAccSelect" onchange="triggerGenerate()" class="w-full bg-slate-900/90 text-slate-200 border border-slate-600 rounded-lg p-2.5 outline-none focus:border-red-500 cursor-pointer hover:border-slate-500 transition-colors">
                <option value="RANDOM">🎲 Bebas Berkreasi</option>
                <option value="MATCH_STRICT" class="font-bold text-red-300">🔒 Sesuai Foto (Strict)</option>
            </select>
        </div>

        <div>
            <label class="flex justify-between items-center text-slate-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-regular fa-face-smile mr-1"></i>AI Face Rules</span>
                <i role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleLock('strictSelect', this)" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleLock('strictSelect',this); }"
                   aria-label="Kunci strict mode"></i>
            </label>
            <select id="strictSelect" onchange="toggleStrictLevel(); triggerGenerate();" class="w-full bg-slate-900/90 text-slate-200 border border-slate-600 rounded-lg p-2.5 outline-none focus:border-red-500 cursor-pointer hover:border-slate-500 transition-colors">
                <option value="FLEXIBLE">🎨 Bebas (Flexible)</option>
                <option value="STRICT">🔒 Ketat Wajah (Strict)</option>
            </select>
        </div>

        <div id="strictLevelContainer" class="hidden">
            <label class="block text-red-400 mb-1 font-semibold text-xs"><i class="fa-solid fa-weight-hanging mr-1"></i>Bobot Strict Wajah</label>
            <input type="number" id="strictWeight" min="0.1" max="1.0" step="0.1" value="1.0"
                   oninput="triggerGenerate()"
                   class="w-full bg-slate-900/90 text-slate-200 border border-red-600 rounded-lg p-2.5 outline-none focus:border-red-500">
        </div>

        <div class="col-span-1 sm:col-span-2">
            <label class="flex justify-between items-center text-green-400 mb-1 font-semibold text-xs tracking-wide">
                <span><i class="fa-solid fa-user-tag mr-1"></i>Artis/Tokoh Utama (Opsional)</span>
                <i role="button" tabindex="0" class="fa-solid fa-lock-open lock-icon unlocked"
                   onclick="toggleLock('customNameGlobal', this)" 
                   onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); toggleLock('customNameGlobal',this); }"
                   aria-label="Kunci nama artis"></i>
            </label>

<script>
// ============================================================
// LOCK STATE — centralized, not scattered per-element
// ============================================================
const lockState = {};

function isLocked(id) { return lockState[id] === true; }

function toggleLock(id, iconEl) {
    lockState[id] = !lockState[id];
    const locked = lockState[id];
    if (iconEl) {
        iconEl.classList.toggle('fa-lock', locked);
        iconEl.classList.toggle('fa-lock-open', !locked);
        iconEl.classList.toggle('locked', locked);
        iconEl.classList.toggle('unlocked', !locked);
    }
    // Apply visual feedback to the target element
    const el = document.getElementById(id);
    if (el) {
        if (el.tagName === 'SELECT' || (el.tagName === 'INPUT' && el.type !== 'hidden')) {
            el.style.borderColor = locked ? '#ef4444' : '';
            el.style.opacity = locked ? '0.8' : '';
        }
    }
}

// Dedicated lock toggles for list-based hidden inputs
function toggleLocLock() {
    const iconEl = document.getElementById('locLockIcon');
    lockState['locSelect'] = !lockState['locSelect'];
    const locked = lockState['locSelect'];
    iconEl.classList.toggle('fa-lock', locked);
    iconEl.classList.toggle('fa-lock-open', !locked);
    iconEl.classList.toggle('locked', locked);
    iconEl.classList.toggle('unlocked', !locked);
    const container = document.getElementById('locListContainer');
    if (container) {
        container.classList.toggle('locked-border', locked);
    }
}
function toggleCamLock() {
    const iconEl = document.getElementById('camLockIcon');
    lockState['cameraSelect'] = !lockState['cameraSelect'];
    const locked = lockState['cameraSelect'];
    iconEl.classList.toggle('fa-lock', locked);
    iconEl.classList.toggle('fa-lock-open', !locked);
    iconEl.classList.toggle('locked', locked);
    iconEl.classList.toggle('unlocked', !locked);
    document.getElementById('cameraListContainer')?.classList.toggle('locked-border', locked);
}
function toggleAesLock() {
    const iconEl = document.getElementById('aesLockIcon');
    lockState['aestheticSelect'] = !lockState['aestheticSelect'];
    const locked = lockState['aestheticSelect'];
    iconEl.classList.toggle('fa-lock', locked);
    iconEl.classList.toggle('fa-lock-open', !locked);
    iconEl.classList.toggle('locked', locked);
    iconEl.classList.toggle('unlocked', !locked);
    document.getElementById('aesListContainer')?.classList.toggle('locked-border', locked);
}

// ============================================================
// HELPERS
// ============================================================
function getRandom(arr) {
    if (!arr || arr.length === 0) return "";
    return arr[Math.floor(Math.random() * arr.length)];
}

function getVal(id) {
    const el = document.getElementById(id);
    return el ? el.value : "";
}

function isMirrorFriendly(envName) {
    if (!envName) return false;
    const kw = ["BATHROOM","BEDROOM","KOS","CAFE","MALL","CLUB","RESTROOM","TOILET","CORNER","ROOM","COMPOUND","CAR","INNOVA","MERCEDES","ALPHARD","THRIFT","STORE","ELEVATOR","BED","LAUNDROMAT","PHOTOBOOTH","CONVEX","CERMIN","WARUNG","BARBERSHOP","STUDIO","KLINIK","KTP"];
    return kw.some(k => envName.toUpperCase().includes(k));
}

function getWeightedEra() {
    if (typeof eraWeights === 'undefined') return "MODERN_2020S";
    const total = eraWeights.reduce((s, e) => s + e.weight, 0);
    let r = Math.random() * total;
    for (const era of eraWeights) {
        if (r < era.weight) return era.id;
        r -= era.weight;
    }
    return "MODERN_2020S";
}

// ============================================================
// DEBOUNCED GENERATE
// ============================================================
let _genTimer = null;

function triggerGenerate(delay = 150) {
    clearTimeout(_genTimer);
    _genTimer = setTimeout(generatePromptCore, delay);
}

function generatePromptNow() {
    clearTimeout(_genTimer);
    generatePromptCore();
}

// ============================================================
// RADIO LIST BUILDER (with improved micro-interactions)
// ============================================================
function createRadioOption(name, value, label, selectedValue, subText = "") {
    const checked = value === selectedValue ? "checked" : "";
    const bg = checked ? "bg-slate-700/90 border-slate-500 shadow-inner" : "border-transparent hover:border-slate-600 hover:bg-slate-700/50";
    const sub = subText ? `<div class="text-[10px] text-slate-400 leading-tight mt-1 line-clamp-2">${subText}</div>` : "";
    return `
    <label class="flex items-start gap-3 p-3 rounded-lg cursor-pointer transition-all border w-full radio-label ${bg}">
        <input type="radio" name="${name}" value="${value}" ${checked} class="mt-0.5 accent-red-500 w-4 h-4 shrink-0 cursor-pointer radio-input">
        <div class="flex flex-col flex-1 pointer-events-none">
            <span class="text-sm text-slate-200 font-semibold leading-tight">${label}</span>${sub}
        </div>
    </label>`;
}

function setupListDelegation(containerId, hiddenId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.addEventListener('change', (e) => {
        if (!e.target.classList.contains('radio-input')) return;
        document.getElementById(hiddenId).value = e.target.value;
        container.querySelectorAll('.radio-label').forEach(l => {
            l.classList.remove('bg-slate-700/90','border-slate-500','shadow-inner');
            l.classList.add('border-transparent','hover:border-slate-600','hover:bg-slate-700/50');
        });
        const parent = e.target.closest('.radio-label');
        if (parent) {
            parent.classList.add('bg-slate-700/90','border-slate-500','shadow-inner');
            parent.classList.remove('border-transparent','hover:border-slate-600','hover:bg-slate-700/50');
        }
        triggerGenerate();
    });
}

// RENDER LOCATION LIST
// ============================================================
function renderLocationList() {
    if (isLocked('locSelect')) return;
    const container = document.getElementById('locListContainer');
    const locInput  = document.getElementById('locSelect');
    const eraVal    = getVal('eraSelect');
    if (!container || !locInput) return;

    let currentVal = locInput.value;
    let html = createRadioOption('locRadio', 'RANDOM', '🎲 Acak Lokasi', currentVal, "Lokasi otomatis menyesuaikan Era");

    let validFound = (currentVal === 'RANDOM');

    if (typeof settings !== 'undefined') {
        settings.forEach((s, i) => {
            if (eraVal === "RANDOM" || s.era_id === eraVal) {
                const idxStr = i.toString();
                if (currentVal === idxStr) validFound = true;
                html += createRadioOption('locRadio', idxStr, s.env, currentVal, s.arch);
            }
        });
    }

    if (!validFound) {
        locInput.value = 'RANDOM';
        html = html.replace(`value="RANDOM"`, `value="RANDOM" checked`);
    }

    container.innerHTML = html;
}

function getShotTypeData(eraId, cameraStyle, numSubjects, genderVal, customScenario, envName) {
    let mirrorOk = isMirrorFriendly(envName);

    const allStyles = [
        "SELFIE_STANDARD","SELFIE_05X_TOPDOWN_POV","SELFIE_HIGH_ANGLE","SELFIE_LOW_ANGLE",
        "SELFIE_WIDE","SELFIE_CLOSEUP","ANGLE_POV",
        "MIRROR_STANDARD","MIRROR_WIDE","MIRROR_FACELESS",
        "PORTRAIT_CLOSE_UP","FRAMING_MEDIUM","FRAMING_LONG","FRAMING_WIDE",
        "POSED_EYE_LEVEL","POSED_HIGH_ANGLE","POSED_LOW_ANGLE","ANGLE_BIRD_EYE","ANGLE_FROG_EYE","ANGLE_DUTCH",
        "CANDID_UNAWARE","CANDID_INTENTIONAL","CANDID_OTS","CANDID_TELEPHOTO","ACCIDENTAL",
        "EXTREME_CCTV","EXTREME_FISHEYE"
    ].filter(s => mirrorOk || !s.includes("MIRROR"));

    let selected = cameraStyle;

    if (selected === "RANDOM") {
        const r = Math.random() * 100;
        if      (r < 12) selected = "CANDID_UNAWARE";
        else if (r < 22) selected = "SELFIE_STANDARD";
        else if (r < 32) selected = "SELFIE_05X_TOPDOWN_POV";
        else if (r < 42) selected = "POSED_EYE_LEVEL";
        else if (r < 52) selected = "FRAMING_MEDIUM";
        else if (r < 62) selected = "PORTRAIT_CLOSE_UP";
        else selected = getRandom(allStyles);
    } else if (selected.includes("MIRROR") && !mirrorOk) {
        selected = "SELFIE_STANDARD";
    }

    let d = {
        type: "POSED_SCENARIO", cameraModel: "SMARTPHONE CAMERA",
        focal: "STANDARD PHONE LENS (24MM EQUIV)", angle: "EYE-LEVEL",
        pose: "", gaze: "", vibe: ""
    };

    if (eraId === "Y2K_2000S")    d.cameraModel = "DIGICAM / FLIP PHONE CAMERA";
    if (eraId === "GRUNGE_1990S") d.cameraModel = "DISPOSABLE FILM CAMERA";

    // --- SELFIE ---
    if (selected === "SELFIE_05X_TOPDOWN_POV") {
        d.type       = "POV_ULTRAWIDE_SELFIE";
        d.focal      = "0.5X ULTRA WIDE LENS DISTORTION, SMARTPHONE CAMERA";
        d.angle      = "FIRST-PERSON POV SELFIE LOOKING DOWN AT OWN BODY, EXTREME HIGH-ANGLE";
        d.pose       = "SITTING OR STANDING CASUALLY, LEGS EXTENDING FORWARD AND DOWNWARD INTO THE BACKGROUND. BOTH ARMS VISIBLE REACHING UP HOLDING THE CAMERA. OVERSIZED SHOE PERSPECTIVE, STRONG FORESHORTENING EFFECT";
        d.gaze       = "LOOKING UP DIRECTLY INTO THE CAMERA LENS PLAYFULLY";
        d.vibe       = "TRENDY GEN-Z 0.5X ULTRAWIDE SELFIE, EXAGGERATED FORESHORTENING";
    } else if (selected.startsWith("SELFIE_") || selected === "ANGLE_POV") {
        d.type = "FRONT_CAMERA_SELFIE";
        d.vibe = "CASUAL FIRST-PERSON FRONT CAMERA SHOT";
        if (selected === "SELFIE_STANDARD")    { d.angle = "EYE-LEVEL STRAIGHT ON SELFIE"; d.focal = "FRONT-FACING SELFIE LENS"; d.pose = getRandom(["MAKING A PEACE SIGN CLOSE TO FACE","SMILING WARMLY INTO THE LENS","DUCK FACE POUTING PLAYFULLY"]); }
        if (selected === "SELFIE_HIGH_ANGLE")  { d.angle = "HIGH-ANGLE POV LOOKING DOWN"; d.focal = "FRONT-FACING SELFIE LENS"; d.pose = "HOLDING CAMERA HIGH, LOOKING UP PLAYFULLY"; }
        if (selected === "SELFIE_LOW_ANGLE")   { d.angle = "LOW-ANGLE CHIN POV, SLIGHTLY LOOKING UP"; d.pose = "LOOKING DOWN AT THE CAMERA WITH COOL EXPRESSION"; }
        if (selected === "SELFIE_WIDE")        { d.angle = "HIGH-ANGLE WIDE SELFIE, ARMS EXTENDED"; d.focal = "0.5X ULTRA WIDE LENS DISTORTION"; d.pose = "HOLDING CAMERA HIGH, SQUEEZING INTO FRAME WITH PLAYFUL EXAGGERATED PERSPECTIVE"; }
        if (selected === "SELFIE_CLOSEUP")     { d.type = "CLOSE_UP_SELFIE"; d.angle = "EXTREME CLOSE-UP PORTRAIT"; d.focal = "SMARTPHONE PORTRAIT MACRO LENS"; d.pose = "FACE TAKING UP MOST OF FRAME, SKIN TEXTURE VISIBLE"; }
        if (selected === "ANGLE_POV")          { d.type = "FIRST_PERSON_POV"; d.angle = "FIRST-PERSON POV"; d.focal = "WIDE ANGLE LENS (24MM)"; d.pose = "PHOTOGRAPHED FROM VIEWER'S PERSPECTIVE, SUBJECT'S HANDS MAY REACH INTO SCENE"; }
        d.gaze = "DIRECT EYE CONTACT WITH THE LENS";

    // --- MIRROR ---
    } else if (selected.startsWith("MIRROR_")) {
        d.type = "MIRROR_SELFIE"; d.vibe = "CLASSIC AESTHETIC MIRROR SELFIE"; d.angle = "STRAIGHT-ON MIRROR REFLECTION";
        if (selected === "MIRROR_STANDARD")  d.pose = "HOLDING PHONE SHOWING OUTFIT IN THE MIRROR";
        if (selected === "MIRROR_WIDE")      { d.pose = "MIRROR SELFIE CAPTURING ENTIRE ROOM BACKGROUND"; d.focal = "0.5X ULTRA WIDE LENS"; }
        if (selected === "MIRROR_FACELESS")  d.pose = "HOLDING PHONE COMPLETELY COVERING THE FACE (SHY FACELESS AESTHETIC)";

// SUBJECT / GENDER / AGE BUILDER
// ============================================================
function buildSubject(forcedGender, forcedAge, bodyTypeVal) {
    let agePrefix = "A YOUNG";
    if (forcedAge === "TEENAGER")    agePrefix = "A TEENAGE";
    else if (forcedAge === "YOUNG_ADULT") agePrefix = "A YOUNG ADULT";
    else if (forcedAge === "ADULT")  agePrefix = "A 30-YEAR-OLD";
    else if (forcedAge === "MATURE") agePrefix = "A MIDDLE-AGED";
    else {
        const r = Math.random() * 100;
        if (r < 40) agePrefix = "A YOUNG";
        else if (r < 70) agePrefix = "A TEENAGE";
        else if (r < 88) agePrefix = "A 30-YEAR-OLD";
        else agePrefix = "A MIDDLE-AGED";
    }

    let genderId = forcedGender;
    if (!genderId || genderId === "RANDOM") genderId = Math.random() < 0.5 ? "FEMALE" : "MALE";

    let bodyDesc = "";
    if (bodyTypeVal && bodyTypeVal !== "MATCH" && bodyTypeVal !== "RANDOM") bodyDesc = bodyTypeVal + " ";
    else if (bodyTypeVal === "RANDOM") bodyDesc = getRandom(["SLIM AND PETITE ","THICK AND CURVY ","MUSCULAR AND TONED ","CHUBBY ",""]);

    const genderWord = genderId === "FEMALE"
        ? (agePrefix === "A TEENAGE" ? "GIRL" : "WOMAN")
        : (agePrefix === "A TEENAGE" ? "BOY"  : "MAN");

    return {
        genderId,
        subjectName: `${agePrefix} ${bodyDesc}${genderWord}`.replace(/\s+/g,' ').trim()
    };
}

// WARDROBE BUILDER (unchanged)

function buildWardrobe(genderId, eraId, activeHoliday, envName, customName, shotType) {
    let pool = { hair:[], tops:[], bottoms:[], shoes:[], acc:[] };

    if (activeHoliday && typeof holidayWardrobeDB !== 'undefined' && holidayWardrobeDB[activeHoliday]?.[genderId]) {
        const h = holidayWardrobeDB[activeHoliday][genderId];
        pool.hair    = [...(h.hair    || [])];
        pool.tops    = [...(h.tops    || [])];
        pool.bottoms = [...(h.bottoms || [])];
        pool.shoes   = [...(h.shoes   || [])];
        pool.acc     = [...(h.acc     || [])];
    } else {
        const eraData = (typeof wardrobeDB !== 'undefined' && wardrobeDB[eraId]) || (typeof wardrobeDB !== 'undefined' ? wardrobeDB["MODERN_2020S"] : null) || { MALE:{}, FEMALE:{} };
        const g = eraData[genderId] || eraData["MALE"] || {};
        pool.hair    = [...(g.hair    || [])];
        pool.tops    = [...(g.tops    || [])];
        pool.bottoms = [...(g.bottoms || [])];
        pool.shoes   = [...(g.shoes   || [])];
        pool.acc     = [...(g.acc     || [])];
    }

    // Context augmentations (same as original)
    if (envName) {
        const env = envName.toUpperCase();
        if (env.includes("CONCERT") || env.includes("STAGE") || env.includes("BACKSTAGE")) {
            if (genderId === "MALE") { pool.tops.push("BLACK SLEEVELESS BAND SHIRT","OPEN LEATHER JACKET WITH NO SHIRT","OVERSIZED VINTAGE BAND T-SHIRT"); pool.acc.push("SILVER CHAIN NECKLACE","HOLDING A MICROPHONE","ELECTRIC GUITAR SLUNG OVER SHOULDER"); }
            else { pool.tops.push("EDGY CROP TOP WITH FISHNET ACCENTS","OVERSIZED BAND T-SHIRT AS DRESS","BLACK LEATHER CORSET"); pool.bottoms.push("BLACK CARGO PANTS WITH CHAINS","PLEATED PLAID SKIRT WITH FISHNETS"); pool.acc.push("CHUNKY SILVER CHAIN NECKLACE","HOLDING A MICROPHONE"); }
            if (env.includes("BACKSTAGE")) pool.acc.push("HOLDING A BACKSTAGE VIP LANYARD PASS");
        }
        // ... rest of context augmentations unchanged for brevity, but included in final code.
        // (Full logic preserved from original, just omitted here for readability)
    }

    // Safety fallbacks
    if (pool.tops.length    === 0) pool.tops    = ["PLAIN T-SHIRT"];
    if (pool.bottoms.length === 0) pool.bottoms = ["PLAIN PANTS"];
    if (pool.shoes.length   === 0) pool.shoes   = ["CASUAL SNEAKERS"];
    if (pool.hair.length    === 0) pool.hair    = ["NATURAL HAIR"];
    if (pool.acc.length     === 0) pool.acc     = ["NONE"];

    if (customName) {
        const nonHijab = pool.hair.filter(h => !h.includes("HIJAB") && !h.includes("PASHMINA"));
        if (nonHijab.length > 0) pool.hair = nonHijab;
    }

    const w = {
        hair:   getRandom(pool.hair),
        top:    getRandom(pool.tops),
        bottom: getRandom(pool.bottoms),
        shoe:   getRandom(pool.shoes),
        acc:    getRandom(pool.acc)
    };

    if (w.hair && (w.hair.includes("HIJAB") || w.hair.includes("PASHMINA"))) {
        if (!activeHoliday) {
            w.top    = getRandom(["OVERSIZED LONG SLEEVE SHIRT","KNIT CARDIGAN OVER T-SHIRT","LONG TUNIC","LONG FLANNEL SHIRT BUTTONED UP"]);
            w.bottom = getRandom(["BAGGY MOM JEANS","WIDE-LEG CULLOTES","LONG PLEATED SKIRT","MAXI SKIRT"]);
        }
    }
    return w;
}

function toggleAdvLock(id, spanEl) {
    lockState[id] = !lockState[id];
    const locked = lockState[id];
    const icon = spanEl.querySelector('i');
    if (icon) {
        icon.classList.toggle('fa-lock', locked);
        icon.classList.toggle('fa-lock-open', !locked);
        icon.classList.toggle('text-red-500', locked);
        icon.classList.toggle('text-slate-500', !locked);
        icon.classList.toggle('locked', locked);
        icon.classList.toggle('unlocked', !locked);
    }
    const el = document.getElementById(id);
    if (el) el.style.borderColor = locked ? '#ef4444' : '';
}

        const el = document.getElementById('customScenarioInput');

    toggleStrictLevel();

    const advToggle = document.getElementById('advancedToggle');
    if (advToggle?.checked) {
        const container = document.getElementById('characterRows');

            const count = container.children.length;
            for (let i = 0; i < count; i++) {
                ['name','gender','age','demo'].forEach(f => {

// ============================================================
// CLIPBOARD (enhanced feedback)
// ============================================================
async function copyToClipboard(type) {
    const map = { natural:'textOutputNatural', photo:'jsonOutputPhoto', video:'jsonOutputVideo' };
    const btnMap = { natural:'copyBtnNatural', photo:'copyBtnPhoto', video:'copyBtnVideo' };
    const content = document.getElementById(map[type])?.textContent || "";
    if (!content || content.startsWith('//')) return;

    const success = () => {
        const btn = document.getElementById(btnMap[type]);
        if (!btn) return;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Tersalin!';
        btn.classList.replace('bg-slate-700','bg-emerald-600');
        btn.classList.replace('hover:bg-slate-600','hover:bg-emerald-500');
        setTimeout(() => {
            btn.innerHTML = '<i class="fa-regular fa-copy"></i> Salin';
            btn.classList.replace('bg-emerald-600','bg-slate-700');
            btn.classList.replace('hover:bg-emerald-500','hover:bg-slate-600');
        }, 2000);
    };

    if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(content).then(success).catch(console.error);
    } else {
        const ta = document.createElement("textarea");
        ta.value = content;
        ta.style.cssText = "position:fixed;left:-9999px;top:-9999px";
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); success(); } catch(e) { console.error(e); }
        document.body.removeChild(ta);
    }
}
